<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ロッカー管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, sans-serif;
  background: #f7f3ff;
  overflow: hidden;
}
.wrap {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding: 12px 12px env(safe-area-inset-bottom);
  gap: 6px;
}

/* まとめ */
.summary {
background: #7c5cbf;
border-radius: 18px;
padding: 10px 14px;
flex-shrink: 0;
box-shadow: 0 4px 16px rgba(120,80,200,0.25);
}
.summary-title {
font-size: 11px;
color: rgba(255,255,255,0.6);
font-weight: 600;
margin-bottom: 4px;
}
.summary-line {
display: flex;
flex-wrap: wrap;
gap: 2px 10px;
font-size: 16px;
font-weight: 800;
color: white;
}
.summary-ok {
font-size: 15px;
font-weight: 700;
color: #c8f0d2;
}

/* アイテムカード */
.item-card {
background: white;
border-radius: 16px;
padding: 0 14px;
flex: 1;
display: flex;
align-items: center;
gap: 8px;
box-shadow: 0 2px 8px rgba(120,80,200,0.08);
}
.item-name {
font-size: 20px;
font-weight: 700;
color: #333;
width: 58px;
flex-shrink: 0;
}
.counter {
display: flex;
align-items: center;
gap: 8px;
flex: 1;
}
.cbtn {
width: 44px;
height: 44px;
border-radius: 14px;
border: none;
font-size: 24px;
font-weight: 700;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
-webkit-tap-highlight-color: transparent;
box-shadow: 0 3px 0 rgba(0,0,0,0.10);
flex-shrink: 0;
}
.cbtn:active { transform: translateY(2px); box-shadow: none; }
.cbtn-minus { background: #ede9ff; color: #7c5cbf; }
.cbtn-plus  { background: #7c5cbf; color: white; }
.cval {
font-size: 28px;
font-weight: 800;
color: #222;
width: 32px;
text-align: center;
}
.target-wrap {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
flex-shrink: 0;
}
.target-label {
font-size: 10px;
color: #ccc;
font-weight: 600;
}
.target-inner {
display: flex;
align-items: center;
gap: 4px;
}
.tbtn {
width: 22px;
height: 22px;
border-radius: 7px;
border: none;
font-size: 13px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
-webkit-tap-highlight-color: transparent;
background: #f0ecff;
color: #9b7edb;
font-weight: 700;
}
.tval {
font-size: 14px;
font-weight: 700;
color: #9b7edb;
width: 16px;
text-align: center;
}
.need-wrap {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
flex-shrink: 0;
}
.need-label {
font-size: 10px;
color: #ccc;
font-weight: 600;
}
.need-badge {
width: 48px;
height: 48px;
border-radius: 14px;
display: flex;
align-items: center;
justify-content: center;
font-size: 26px;
font-weight: 900;
box-shadow: 0 3px 0 rgba(0,0,0,0.08);
}
.need-zero { background: #e8f8ec; color: #4caf6f; }
.need-some { background: #fff4e0; color: #f5a623; }
.need-many { background: #ffeaea; color: #e8453c; }
</style>

</head>
<body>
<div class="wrap">
  <div class="summary" id="summary"></div>
  <div id="itemList" style="display:flex;flex-direction:column;gap:6px;flex:1;"></div>
</div>

<script>
var items = [
  { id: "longt",  name: "ロンT",  count: 2, target: 2 },
  { id: "tshirt", name: "半袖",   count: 2, target: 2 },
  { id: "hadagi", name: "肌着",   count: 2, target: 2 },
  { id: "zubon",  name: "ズボン", count: 2, target: 2 },
  { id: "pants",  name: "パンツ", count: 2, target: 2 }
];

function save() {
  var data = {};
  for (var i = 0; i < items.length; i++) {
    data[items[i].id] = { count: items[i].count, target: items[i].target };
  }
  localStorage.setItem('locker', JSON.stringify(data));
}
function load() {
  var raw = localStorage.getItem('locker');
  if (!raw) return;
  var data = JSON.parse(raw);
  for (var i = 0; i < items.length; i++) {
    if (data[items[i].id]) {
      items[i].count  = data[items[i].id].count;
      items[i].target = data[items[i].id].target;
    }
  }
}
function changeCount(id, d) {
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) { items[i].count = Math.max(0, items[i].count + d); }
  }
  save(); render();
}
function changeTarget(id, d) {
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) { items[i].target = Math.max(1, items[i].target + d); }
  }
  save(); render();
}
function needClass(n) {
  return n === 0 ? 'need-zero' : n === 1 ? 'need-some' : 'need-many';
}

function render() {
  var html = '';
  var lines = [];

  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var need = Math.max(0, it.target - it.count);
    if (need > 0) lines.push(it.name + need + '枚');

    html += '<div class="item-card">';
    html += '<div class="item-name">' + it.name + '</div>';
    html += '<div class="counter">';
    html += '<button class="cbtn cbtn-plus" onclick="changeCount(\'' + it.id + '\',1)">＋</button>';
    html += '<div class="cval">' + it.count + '</div>';
    html += '<button class="cbtn cbtn-minus" onclick="changeCount(\'' + it.id + '\',-1)">－</button>';
    html += '</div>';
    html += '<div class="target-wrap"><div class="target-label">目標</div><div class="target-inner">';
    html += '<button class="tbtn" onclick="changeTarget(\'' + it.id + '\',1)">＋</button>';
    html += '<div class="tval">' + it.target + '</div>';
    html += '<button class="tbtn" onclick="changeTarget(\'' + it.id + '\',-1)">－</button>';
    html += '</div></div>';
    html += '<div class="need-wrap"><div class="need-label">明日</div>';
    html += '<div class="need-badge ' + needClass(need) + '">' + need + '</div></div>';
    html += '</div>';
  }

  document.getElementById('itemList').innerHTML = html;

  var s = '<div class="summary-title">📋 明日カゴに入れるもの</div>';
  s += lines.length === 0
    ? '<div class="summary-ok">✓ 全部そろってます！</div>'
    : '<div class="summary-line">' + lines.map(function(l){ return '<span>' + l + '</span>'; }).join('') + '</div>';
  document.getElementById('summary').innerHTML = s;
}
load(); render();
</script>

</body>
</html>
